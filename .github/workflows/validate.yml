name: Validate larena skill

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate skill frontmatter
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          text = Path('skills/larena/SKILL.md').read_text(encoding='utf-8')
          match = re.match(r'^---\n(.*?)\n---', text, re.S)
          assert match, 'missing frontmatter'
          frontmatter = match.group(1)
          assert 'name: larena' in frontmatter
          assert 'description:' in frontmatter
          print('Skill frontmatter OK')
          PY
      - name: Compile scripts
        run: |
          python -m py_compile scripts/*.py
      - name: GrowGraph contract gate
        run: python scripts/growgraph_contract_gate.py
